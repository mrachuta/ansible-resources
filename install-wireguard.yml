---
- name: Install and configure WireGuard
  hosts: "{{ target_hosts | default('wireguard') }}"
  become: true
  gather_facts: true

  pre_tasks:
    - name: Skip host if OS is unsupported
      when: ansible_distribution not in ['Ubuntu', 'Debian']
      ansible.builtin.meta: end_host

  handlers:
    - name: Restart WireGuard
      ansible.builtin.systemd:
        name: wg-quick@wg0
        state: restarted

    - name: Reload sysctl
      ansible.builtin.command:
        cmd: sysctl --system
      changed_when: false

  tasks:
    - name: Install WireGuard and dependencies
      ansible.builtin.apt:
        name:
          - wireguard
          - iptables
          - resolvconf
          - qrencode
        state: present
        update_cache: true

    - name: Create WireGuard configuration directory
      ansible.builtin.file:
        path: /etc/wireguard
        state: directory
        owner: root
        group: root
        mode: '0600'

    - name: Deploy WireGuard params file
      ansible.builtin.template:
        src: resources/wireguard/{{ inventory_hostname }}/params.j2
        dest: /etc/wireguard/params
        owner: root
        group: root
        mode: '0644'

    - name: Deploy WireGuard configuration file
      ansible.builtin.template:
        src: resources/wireguard/{{ inventory_hostname }}/wg0.conf.j2
        dest: /etc/wireguard/wg0.conf
        owner: root
        group: root
        mode: '0644'
      notify: Restart WireGuard

    - name: Enable IP forwarding for WireGuard
      ansible.builtin.copy:
        dest: /etc/sysctl.d/wg.conf
        content: |
          net.ipv4.ip_forward = 1
          net.ipv6.conf.all.forwarding = 1
        owner: root
        group: root
        mode: '0644'
      notify: Reload sysctl

    - name: Ensure WireGuard service is enabled and started
      ansible.builtin.systemd:
        name: wg-quick@wg0
        enabled: true
        state: started

    - name: Create directory for WireGuard helper script
      ansible.builtin.file:
        path: /opt/wireguard
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Download wireguard-install helper script
      ansible.builtin.get_url:
        # No versioning
        url: https://raw.githubusercontent.com/angristan/wireguard-install/refs/heads/master/wireguard-install.sh
        dest: /opt/wireguard/wireguard-install.sh # Corrected destination path to be a file inside the directory.
        mode: '0700'
        owner: root
        group: root
